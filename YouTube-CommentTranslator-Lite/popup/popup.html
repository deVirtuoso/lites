<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Translator Lite</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Main App View -->
    <div id="mainView" class="view active">
      <header>
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <h1>YT Chat Translator</h1>
        </div>
        <div class="header-actions">
          <button id="btnShowAuth" class="btn-signin">Sign In</button>
          <button id="btnSignOut" class="btn-icon" style="display:none;" title="Sign Out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <section class="rating-section">
        <p>Give us five stars</p>
        <a href="#" id="linkRating" class="stars-container">
          <svg class="star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          <svg class="star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          <svg class="star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          <svg class="star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          <svg class="star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </a>
      </section>

      <main class="settings-section">
        <label class="row">
          <div class="toggle-switch">
            <input type="checkbox" id="enabled" />
            <span class="slider"></span>
          </div>
          <span class="label-text">Auto-translate comments &amp; live chat</span>
        </label>
        <label class="row">
          <div class="toggle-switch">
            <input type="checkbox" id="bilingualDisplay" />
            <span class="slider"></span>
          </div>
          <span class="label-text">Show original + translation</span>
        </label>
        
        <div class="setting-grid">
          <label class="col">
            <span class="label-text">Your language</span>
            <select id="yourLanguage" class="select-modern"></select>
          </label>
          <label class="col">
            <span class="label-text">Engine</span>
            <select id="engine" class="select-modern">
              <option value="microsoft">Microsoft</option>
              <option value="yandex">Yandex</option>
              <option value="google2">Google</option>
              <option value="google">Google (legacy)</option>
            </select>
          </label>
        </div>

        <div class="setting-grid" style="align-items: center; margin-bottom: 8px;">
          <label class="col" style="flex: 0 0 100px;">
            <span class="label-text">Trans. color</span>
            <div class="color-picker-wrapper">
              <input type="color" id="color" class="color-picker" />
            </div>
          </label>
          <label class="col">
            <span class="label-text">More from Us...</span>
            <select id="moreApps" class="select-modern">
              <option value="" disabled selected>Explore Apps</option>
              <option value="fb">Facebook Messenger Chat Translator</option>
              <option value="discord">Discord Chat Translator</option>
              <option value="twitch">Twitch Chat Translator</option>
              <option value="whatsapp">WhatsApp Chat Translator</option>
              <option value="telegram">Telegram Chat Translator</option>
            </select>
          </label>
        </div>

        <p class="hint">Reload YouTube after changes to apply.</p>
      </main>

      <!-- Displayed when logged in as non-Pro -->
      <div id="trialBanner" class="trial-banner" style="display: none;">
        <span>Trial: <strong>7 Days Left</strong></span>
      </div>

      <div class="pro-section">
        <a href="#" id="linkUpgrade" class="btn-pro">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          Upgrade to Pro
        </a>
      </div>
    </div>

    <!-- Auth View -->
    <div id="authView" class="view">
      <header class="auth-header">
        <button id="btnBackToMain" class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h2 id="authTitle">Sign In</h2>
      </header>

      <main class="auth-forms">
        <div class="test-account-notice">
          Test Account: <strong>test@test.com</strong> / <strong>password</strong>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
          <label class="col">
            <span class="label-text">Email</span>
            <input type="email" id="loginEmail" class="input-modern" placeholder="you@example.com" required />
          </label>
          <label class="col">
            <span class="label-text">Password</span>
            <input type="password" id="loginPassword" class="input-modern" placeholder="••••••••" required />
          </label>
          <button type="submit" class="btn-primary">Login</button>
          <div class="auth-links">
            <a href="#" id="linkToForgot">Forgot password?</a>
          </div>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" class="auth-form">
          <label class="col">
            <span class="label-text">Email</span>
            <input type="email" class="input-modern" placeholder="you@example.com" required />
          </label>
          <label class="col">
            <span class="label-text">Password</span>
            <input type="password" class="input-modern" placeholder="••••••••" required />
          </label>
          <button type="submit" class="btn-primary">Sign Up</button>
        </form>

        <!-- Forgot Password Form -->
        <form id="forgotForm" class="auth-form">
          <p class="auth-desc">Enter your email to reset password.</p>
          <label class="col">
            <span class="label-text">Email</span>
            <input type="email" class="input-modern" placeholder="you@example.com" required />
          </label>
          <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <button type="button" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>

        <div class="auth-switch">
          <span id="authSwitchText">Don't have an account?</span>
          <a href="#" id="linkToggleAuth">Sign up</a>
        </div>
      </main>
    </div>

    <script src="popup.js"></script>
  </body>
</html>

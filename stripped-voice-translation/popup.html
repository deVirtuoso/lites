<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TranslateTube Voice</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-glow popup-glow--left" aria-hidden="true"></div>
    <div class="popup-glow popup-glow--right" aria-hidden="true"></div>

    <div class="modal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
      <header class="modal-hero">
        <div class="brand">
          <img src="logo128.f7052d60.png" alt="" class="brand-logo" width="32" height="32" />
          <div class="brand-copy">
            <p class="brand-eyebrow">TranslateTube</p>
            <h1 id="modalTitle" class="brand-title">Voice Translation</h1>
          </div>
        </div>
        <p class="brand-tagline">Real-time dubbed captions on YouTube</p>
      </header>

      <section class="stars-card" aria-label="Rate us on the Chrome Web Store">
        <a
          id="linkRating"
          class="stars-link"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          title="Leave a review on the Chrome Web Store"
        >
          <span class="stars-label">Give us five stars</span>
          <span class="stars-row" aria-hidden="true">
            <svg class="star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            <svg class="star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            <svg class="star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            <svg class="star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            <svg class="star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          </span>
          <span class="stars-cta">Rate on Chrome Web Store</span>
        </a>
      </section>

      <section id="signedInPanel" class="signed-in-panel hidden">
        <p class="signed-in-greeting">Signed in as <strong id="userEmailDisplay"></strong></p>
        <button type="button" id="btnSignOut" class="btn-ghost">Sign out</button>
      </section>

      <section id="authPanel" class="auth-panel">
        <div class="auth-tabs" role="tablist" aria-label="Authentication">
          <button
            type="button"
            id="tabSignUp"
            class="auth-tab active"
            role="tab"
            aria-selected="true"
            aria-controls="panelSignUp"
          >
            Sign Up
          </button>
          <button
            type="button"
            id="tabSignIn"
            class="auth-tab"
            role="tab"
            aria-selected="false"
            aria-controls="panelSignIn"
          >
            Sign In
          </button>
        </div>

        <p id="formError" class="form-error hidden" role="alert"></p>

        <form id="panelSignIn" class="auth-form" role="tabpanel" aria-labelledby="tabSignIn" hidden novalidate>
          <label class="field">
            <span class="field-label">Email</span>
            <input
              type="email"
              id="signInEmail"
              class="field-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <span id="signInEmailError" class="field-error hidden"></span>
          </label>
          <label class="field">
            <span class="field-label">Password</span>
            <input
              type="password"
              id="signInPassword"
              class="field-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <span id="signInPasswordError" class="field-error hidden"></span>
          </label>
          <button type="submit" class="btn-primary" id="btnSignInSubmit">Sign In</button>
        </form>

        <form id="panelSignUp" class="auth-form active" role="tabpanel" aria-labelledby="tabSignUp" novalidate>
          <label class="field">
            <span class="field-label">Email</span>
            <input
              type="email"
              id="signUpEmail"
              class="field-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <span id="signUpEmailError" class="field-error hidden"></span>
          </label>
          <label class="field">
            <span class="field-label">Password</span>
            <input
              type="password"
              id="signUpPassword"
              class="field-input"
              placeholder="At least 6 characters"
              autocomplete="new-password"
              required
              minlength="6"
            />
            <span id="signUpPasswordError" class="field-error hidden"></span>
          </label>
          <button type="submit" class="btn-primary" id="btnSignUpSubmit">Sign up to start trial</button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <button type="button" id="btnGoogle" class="btn-google">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </section>

      <footer class="modal-footer">
        <button type="button" id="linkUpgrade" class="btn-upgrade">
          <span class="btn-upgrade-shine" aria-hidden="true"></span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          Upgrade to Pro
        </button>
        <p class="footer-note">Once logged in, refresh your YouTube page to start translating.</p>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
